services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - .env
    environment:
      CORS_ORIGINS: "http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080"
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE: ""
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
