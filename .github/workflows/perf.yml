name: Perf baseline

on:
  schedule:
    # 每天 02:00 UTC（约北京时间 10:00）
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check server tests

      - name: Perf tests
        env:
          HI_MOCK_LLM: "1"
          OPENAI_API_KEY: ""
        run: pytest -m perf tests/perf/
